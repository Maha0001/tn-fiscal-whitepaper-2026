<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- Outer ring -->
  <circle cx="50" cy="52" r="46" fill="none" stroke="#8B0000" stroke-width="2.5"/>
  <circle cx="50" cy="52" r="42" fill="none" stroke="#8B0000" stroke-width="0.8"/>

  <!-- Temple / Gopuram silhouette -->
  <g fill="#8B0000">
    <!-- Base platform -->
    <rect x="24" y="76" width="52" height="5" rx="1"/>
    <!-- Tier 1 -->
    <rect x="28" y="65" width="44" height="11" rx="1"/>
    <!-- Tier 2 -->
    <rect x="33" y="55" width="34" height="10" rx="1"/>
    <!-- Tier 3 -->
    <rect x="37" y="47" width="26" height="8" rx="1"/>
    <!-- Tier 4 -->
    <rect x="40" y="40" width="20" height="7" rx="1"/>
    <!-- Tier 5 -->
    <rect x="43" y="34" width="14" height="6" rx="1"/>
    <!-- Spire -->
    <polygon points="50,18 44,34 56,34"/>
    <!-- Finial -->
    <circle cx="50" cy="16" r="3"/>

    <!-- Decorative columns (left) -->
    <rect x="26" y="57" width="3" height="19"/>
    <rect x="31" y="47" width="2.5" height="28"/>
    <!-- Decorative columns (right) -->
    <rect x="71" y="57" width="3" height="19"/>
    <rect x="66.5" y="47" width="2.5" height="28"/>
  </g>

  <!-- Tamil Nadu text arc  -->
  <path id="topArc" d="M 12,52 A 38,38 0 0,1 88,52" fill="none"/>
  <text font-family="serif" font-size="7" fill="#8B0000" font-weight="bold" letter-spacing="1">
    <textPath href="#topArc" startOffset="10%">GOVERNMENT OF TAMIL NADU</textPath>
  </text>

  <!-- Bottom Tamil text -->
  <path id="botArc" d="M 15,60 A 35,35 0 0,0 85,60" fill="none"/>
  <text font-family="serif" font-size="6.5" fill="#8B0000" font-weight="bold">
    <textPath href="#botArc" startOffset="14%">தமிழ்நாடு அரசு</textPath>
  </text>

  <!-- Stars flanking -->
  <text x="17" y="55" font-size="8" fill="#8B0000">★</text>
  <text x="75" y="55" font-size="8" fill="#8B0000">★</text>
</svg>
